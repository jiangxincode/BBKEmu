<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="blueSwoosh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="orangeSwoosh" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#88AA66"/>
      <stop offset="100%" stop-color="#667744"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>
    <linearGradient id="kbdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="300" fill="url(#grid)"/>
  </g>

  <!-- Left: Device illustration (scaled down) -->
  <g transform="translate(180,150) scale(0.55)">
    <!-- White sticker border -->
    <path d="M-195,120 C-220,90 -230,40 -215,-10 C-200,-60 -175,-105 -140,-135
             C-100,-170 -40,-190 35,-190
             C110,-190 170,-170 210,-135
             C245,-105 260,-60 255,-10
             C245,40 230,90 210,120
             L-195,120 Z"
          fill="white" stroke="#1A4B8C" stroke-width="10"/>

    <!-- Blue swoosh (left) -->
    <path d="M-180,110 C-200,80 -205,30 -190,-20
             C-175,-65 -150,-100 -110,-125
             C-75,-145 -30,-158 20,-158
             L10,-140 C-30,-140 -75,-130 -110,-108
             C-150,-80 -170,-35 -165,10
             C-160,50 -145,80 -125,95 Z"
          fill="#0066CC"/>

    <!-- Orange swoosh (right) -->
    <path d="M205,110 C225,80 235,30 225,-20
             C215,-65 195,-100 160,-125
             C130,-145 95,-158 60,-158
             L70,-140 C100,-140 135,-130 165,-108
             C200,-80 220,-35 225,10
             C228,50 220,80 200,95 Z"
          fill="#FF8C00"/>

    <!-- Star sparkle -->
    <g transform="translate(220,-90)" opacity="0.95">
      <path d="M0,-30 L6,-10 L26,-10 L10,4 L16,24 L0,13 L-16,24 L-10,4 L-26,-10 L-6,-10 Z"
            fill="#FFD700" stroke="white" stroke-width="2"/>
    </g>

    <!-- Cable -->
    <path d="M165,50 C180,65 190,85 185,105 C180,120 165,128 150,118"
          fill="none" stroke="#888" stroke-width="6" stroke-linecap="round"/>
    <rect x="140" y="112" width="20" height="14" rx="3" fill="#666" stroke="#555" stroke-width="1"/>

    <!-- Device body - top half (screen) -->
    <rect x="-130" y="-148" width="260" height="130" rx="10" fill="url(#bodyGrad)" stroke="#AAA" stroke-width="1"/>

    <!-- Screen bezel -->
    <rect x="-115" y="-138" width="200" height="82" rx="5" fill="#222"/>

    <!-- LCD Screen -->
    <rect x="-110" y="-133" width="190" height="72" rx="4" fill="url(#screenGrad)"/>

    <!-- Screen content lines -->
    <g opacity="0.45">
      <rect x="-100" y="-122" width="130" height="3.5" fill="#445533" rx="1"/>
      <rect x="-100" y="-113" width="110" height="3.5" fill="#445533" rx="1"/>
      <rect x="-100" y="-104" width="155" height="3.5" fill="#445533" rx="1"/>
      <rect x="-100" y="-95" width="95" height="3.5" fill="#445533" rx="1"/>
      <rect x="-100" y="-86" width="140" height="3.5" fill="#445533" rx="1"/>
      <rect x="-100" y="-77" width="120" height="3.5" fill="#445533" rx="1"/>
      <rect x="-100" y="-68" width="160" height="3.5" fill="#445533" rx="1"/>
    </g>

    <!-- BBK text on screen top -->
    <text x="5" y="-130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2255AA" opacity="0.65">步步高</text>

    <!-- Speaker holes -->
    <g fill="#AAA">
      <circle cx="95" cy="-118" r="2.5"/>
      <circle cx="103" cy="-118" r="2.5"/>
      <circle cx="95" cy="-110" r="2.5"/>
      <circle cx="103" cy="-110" r="2.5"/>
      <circle cx="95" cy="-102" r="2.5"/>
      <circle cx="103" cy="-102" r="2.5"/>
      <circle cx="95" cy="-94" r="2.5"/>
      <circle cx="103" cy="-94" r="2.5"/>
    </g>

    <!-- Screen bottom label -->
    <text x="0" y="-52" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#888">159×96 LCD</text>

    <!-- Device body - bottom half (keyboard) -->
    <rect x="-140" y="-18" width="280" height="128" rx="10" fill="url(#kbdGrad)" stroke="#AAA" stroke-width="1"/>

    <!-- Keyboard rows -->
    <g>
      <rect x="-125" y="-5" width="26" height="18" rx="5" fill="#3366CC"/>
      <rect x="-94" y="-5" width="26" height="18" rx="5" fill="#3366CC"/>
      <rect x="-63" y="-5" width="26" height="18" rx="5" fill="#3366CC"/>
      <rect x="-32" y="-5" width="26" height="18" rx="5" fill="#CC3333"/>
      <rect x="-1" y="-5" width="26" height="18" rx="5" fill="#CC3333"/>
      <rect x="30" y="-5" width="26" height="18" rx="5" fill="#339933"/>
      <rect x="61" y="-5" width="26" height="18" rx="5" fill="#339933"/>
      <rect x="92" y="-5" width="26" height="18" rx="5" fill="#339933"/>
    </g>
    <g>
      <rect x="-125" y="18" width="26" height="18" rx="5" fill="#CC9933"/>
      <rect x="-94" y="18" width="26" height="18" rx="5" fill="#CC9933"/>
      <rect x="-63" y="18" width="26" height="18" rx="5" fill="#996633"/>
      <rect x="-32" y="18" width="26" height="18" rx="5" fill="#3366CC"/>
      <rect x="-1" y="18" width="26" height="18" rx="5" fill="#CC3333"/>
      <rect x="30" y="18" width="26" height="18" rx="5" fill="#339933"/>
      <rect x="61" y="18" width="26" height="18" rx="5" fill="#CC6633"/>
      <rect x="92" y="18" width="26" height="18" rx="5" fill="#CC6633"/>
    </g>
    <g>
      <rect x="-125" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-94" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-63" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-32" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-1" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="30" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="61" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="92" y="41" width="26" height="18" rx="5" fill="#9999CC"/>
    </g>
    <g>
      <rect x="-125" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-94" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-63" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-32" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="-1" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="30" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="61" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
      <rect x="92" y="64" width="26" height="18" rx="5" fill="#9999CC"/>
    </g>

    <!-- Key labels -->
    <g font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">
      <text x="-112" y="11">A</text>
      <text x="-81" y="11">B</text>
      <text x="-50" y="11">C</text>
      <text x="-19" y="11">D</text>
      <text x="12" y="11">E</text>
      <text x="43" y="11">F</text>
      <text x="74" y="11">G</text>
      <text x="105" y="11">H</text>
      <text x="-112" y="34">I</text>
      <text x="-81" y="34">J</text>
      <text x="-50" y="34">K</text>
      <text x="-19" y="34">L</text>
      <text x="12" y="34">M</text>
      <text x="43" y="34">N</text>
      <text x="74" y="34">O</text>
      <text x="105" y="34">P</text>
      <text x="-112" y="57">Q</text>
      <text x="-81" y="57">R</text>
      <text x="-50" y="57">S</text>
      <text x="-19" y="57">T</text>
      <text x="12" y="57">U</text>
      <text x="43" y="57">V</text>
      <text x="74" y="57">W</text>
      <text x="105" y="57">X</text>
      <text x="-112" y="80">Y</text>
      <text x="-81" y="80">Z</text>
      <text x="-50" y="80">0</text>
      <text x="-19" y="80">1</text>
      <text x="12" y="80">2</text>
      <text x="43" y="80">3</text>
      <text x="74" y="80">4</text>
      <text x="105" y="80">5</text>
    </g>

    <!-- Device hinge -->
    <rect x="-130" y="-22" width="260" height="8" rx="3" fill="#BBB" stroke="#999" stroke-width="0.5"/>
  </g>

  <!-- Right: Text -->
  <g transform="translate(480,0)">
    <!-- 步步高 -->
    <text x="0" y="110" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#4A90D9" opacity="0.9">步步高</text>

    <!-- BBK -->
    <text x="0" y="185" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#1A4B8C">BBK</text>

    <!-- Emu -->
    <text x="260" y="185" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#FF6600">Emu</text>

    <!-- Subtitle -->
    <text x="0" y="220" font-family="Arial, sans-serif" font-size="22" fill="#8899AA" opacity="0.8">Electronic Dictionary Game Emulator</text>

    <!-- Tagline -->
    <text x="0" y="255" font-family="Arial, sans-serif" font-size="16" fill="#667788" opacity="0.6">让步步高电子词典游戏重获新生</text>
  </g>

  <!-- Decorative line -->
  <line x1="450" y1="60" x2="450" y2="240" stroke="#4A90D9" stroke-width="1" opacity="0.3"/>

  <!-- Rust badge -->
  <g transform="translate(1100,270)">
    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#222" stroke="#FF6600" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FF6600" font-weight="bold">🦀 Rust</text>
  </g>
</svg>
