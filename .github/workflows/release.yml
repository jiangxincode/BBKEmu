name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: bbk-emu-linux-x86_64
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: bbk-emu-linux-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: bbk-emu-macos-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: bbk-emu-macos-aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bbk-emu-windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build standalone
        run: cargo build -p bbkemu --release --target ${{ matrix.target }}

      - name: Build libretro core
        run: cargo build -p bbkemu-libretro --release --target ${{ matrix.target }}

      - name: Stage libretro core
        shell: bash
        run: |
          out="libretro/${{ matrix.artifact }}"
          mkdir -p "$out"
          rel="target/${{ matrix.target }}/release"
          # Copy libretro core with correct name
          for f in "bbkemu.dll:bbkemu_libretro.dll" \
                   "libbbkemu.so:bbkemu_libretro.so" \
                   "libbbkemu.dylib:bbkemu_libretro.dylib"; do
            src="${f%%:*}"; dst="${f##*:}"
            if [ -f "$rel/$src" ]; then
              cp "$rel/$src" "$out/$dst"
              break
            fi
          done
          # Copy info file if exists
          if [ -f "crates/bbkemu-libretro/bbkemu_libretro.info" ]; then
            cp "crates/bbkemu-libretro/bbkemu_libretro.info" "$out/"
          fi
          ls -la "$out"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz bbkemu-emu
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip bbkemu-emu.exe
          cd ../../..

      - name: Package libretro (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd libretro
          tar czf ../${{ matrix.artifact }}-libretro.tar.gz ${{ matrix.artifact }}
          cd ..

      - name: Package libretro (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd libretro
          7z a ../${{ matrix.artifact }}-libretro.zip ${{ matrix.artifact }}
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
            ${{ matrix.artifact }}-libretro.*

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          name: "BBKEmu ${{ github.ref_name }}"
          body: |
            BBKEmu ${{ github.ref_name }}

            ## Downloads

            ### Standalone emulator
            - **Linux x86_64**: `bbk-emu-linux-x86_64.tar.gz`
            - **Linux aarch64**: `bbk-emu-linux-aarch64.tar.gz`
            - **macOS x86_64**: `bbk-emu-macos-x86_64.tar.gz`
            - **macOS aarch64**: `bbk-emu-macos-aarch64.tar.gz`
            - **Windows x86_64**: `bbk-emu-windows-x86_64.zip`

            ### libretro core (for RetroArch)
            - Files ending in `-libretro.*` contain `bbkemu_libretro.<ext>`
              plus `bbkemu_libretro.info`, ready to drop into RetroArch.
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
