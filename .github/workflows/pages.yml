name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare deployment directory
        run: |
          # Create deployment directory
          mkdir -p _site

          # Copy site files
          cp -r site/* _site/

          # Copy res directory (logo)
          cp -r res _site/

          # Copy docs/images for game screenshots
          mkdir -p _site/docs
          cp -r docs/images _site/docs/

          # Fix image paths: change ../docs/images/ to docs/images/
          sed -i 's|../docs/images/|docs/images/|g' _site/index.html
          # Fix logo paths: change ../res/ to res/
          sed -i 's|../res/|res/|g' _site/index.html

          # Disable Jekyll processing
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
